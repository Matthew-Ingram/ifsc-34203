<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8"/>
  <meta name="description" content="Matthew Ingram's Native Video Demo"/>
  <meta name="author" content="Matthew Ingram"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matthew Ingram's Native Video Demo</title>
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
    <main>
        <article id="left-video">
            <h1>Native Video</h1>
            <video poster="assets/img/hudson-shelter-falls.jpg" controls="controls" width="640" height="360">
                <source width="640" height="360" src="assets/resources/hudson-shelter-falls.mp4" type="video/mp4"/>
                <source width="640" height="360" src="assets/resources/hudson-shelter-falls.webm" type="video/webm"/>
                <source width="640" height="360" src="assets/resources/hudson-shelter-falls.ogv" type="video/ogv"/>
                <a href="assets/resources/hudson-shelter-falls.mp4" title="Video player unable to load, click to download hudson-shelter-falls.mp4 file">Download Video</a>
            </video>
        </article>
        <article id="right-video">
            <h1>Video.js Implementation</h1>
            <video-player>
                <media-container>
                    <video-skin>
                        <video poster="assets/img/hudson-shelter-falls.jpg" width="640" height="360">
                            <source width="640" height="360" src="assets/resources/hudson-shelter-falls.mp4" type="video/mp4"/>
                            <source width="640" height="360" src="assets/resources/hudson-shelter-falls.webm" type="video/webm"/>
                            <source width="640" height="360" src="assets/resources/hudson-shelter-falls.ogv" type="video/ogv"/>
                        </video>
                    </video-skin>
                </media-container>
            </video-player>
        </article>
    </main>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video.js"></script>
</body>
</html>
